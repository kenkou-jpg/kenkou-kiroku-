        // Initialize app
        function init() {
            renderDays();
            updateProgress();
        }

        // Render all days
        function renderDays() {
            const content = document.getElementById('content');
            content.innerHTML = '';

            DAYS_DATA.forEach(dayData => {
                const daySection = createDaySection(dayData);
                content.appendChild(daySection);
            });
        }

        // Create day section
        function createDaySection(dayData) {
            const section = document.createElement('div');
            section.className = 'day-section';
            section.id = `day-${dayData.day}`;

            const header = document.createElement('div');
            header.className = 'day-header';
            header.onclick = () => toggleDayContent(dayData.day);

            const dayNumber = document.createElement('div');
            dayNumber.className = 'day-number';
            dayNumber.textContent = `Day ${dayData.day}`;

            const dayTitle = document.createElement('div');
            dayTitle.className = 'day-title';
            dayTitle.innerHTML = `
                <h2>${dayData.title}</h2>
                <p>${dayData.subtitle}</p>
            `;

            header.appendChild(dayNumber);
            header.appendChild(dayTitle);
            section.appendChild(header);

            const content = document.createElement('div');
            content.className = 'day-content';
            content.id = `day-${dayData.day}-content`;

            // Checklist
            const checklistGroup = document.createElement('div');
            checklistGroup.className = 'checklist-group';
            checklistGroup.innerHTML = '<div class="checklist-title">✓ チェックリスト</div>';

            dayData.checklist.forEach(item => {
                const checkboxItem = document.createElement('div');
                checkboxItem.className = 'checkbox-item';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = item.id;
                checkbox.onchange = () => {
                    saveData();
                    updateProgress();
                    updateDayCompletion(dayData.day);
                };

                const label = document.createElement('label');
                label.htmlFor = item.id;
                label.textContent = item.label;

                checkboxItem.appendChild(checkbox);
                checkboxItem.appendChild(label);
                checklistGroup.appendChild(checkboxItem);
            });

            content.appendChild(checklistGroup);

            // Metric
            const metricGroup = document.createElement('div');
            metricGroup.className = 'metric-group';

            const metricTitle = document.createElement('div');
            metricTitle.className = 'metric-title';
            metricTitle.textContent = `📊 変化指標：「${dayData.metric}」`;

            const metricInputs = document.createElement('div');
            metricInputs.className = 'metric-inputs';

            // Start score
            const startGroup = document.createElement('div');
            startGroup.className = 'metric-input-group';
            startGroup.innerHTML = `
                <label>開始時</label>
                <input type="number" id="day${dayData.day}_start" min="1" max="10" value="5" onchange="updateProgress(); saveData();">

            const endGroup = document.createElement('div');

            endGroup.innerHTML = `

                <input type="number" id="day${dayData.day}_end" min="1" max="10" value="5" onchange="updateProgress(); saveData();">

                <label>進捗</label>
                <div class="metric-progress" id="day${dayData.day}_progress">+0</div>
            `;

            metricInputs.appendChild(startGroup);
            metricInputs.appendChild(endGroup);
            metricInputs.appendChild(progressGroup);

            const scaleLabels = document.createElement('div');
            scaleLabels.className = 'scale-labels';
            scaleLabels.innerHTML = '<span>1 = 低い</span><span>10 = 高い</span>';

            metricGroup.appendChild(metricTitle);
            metricGroup.appendChild(metricInputs);
            metricGroup.appendChild(scaleLabels);

            content.appendChild(metricGroup);

            // Share section
            const shareSection = document.createElement('div');
            shareSection.className = 'share-section';
            shareSection.innerHTML = `
                <div class="share-title">📱 SNSでシェア</div>
                <div class="share-text">${dayData.shareText.replace(/\n/g, '<br>')}</div>
                <button class="copy-btn" onclick="copyToClipboard('${dayData.shareText.replace(/'/g, "\\'")}')">コピーしてシェア</button>
            `;

            content.appendChild(shareSection);

            // LINE Follow section (only on Day 7)
            if (dayData.day === 7) {
                const lineFollowSection = document.createElement('div');
                lineFollowSection.className = 'line-follow-section';
                lineFollowSection.innerHTML = `
                    <h3>💚 LINE公式をフォローして、次のステップへ</h3>
                    <p>7日間完了後は、LINE公式で、さらに詳しい情報や、次のステップをお届けしています。</p>
                    <button class="line-follow-btn" onclick="alert('LINE公式アカウントのQRコードをスキャンするか、以下のリンクからフォローしてください。\\n\\n※ここにLINE公式アカウントのリンクを設定してください')">LINE公式をフォロー</button>
                `;
                content.appendChild(lineFollowSection);
            }

            section.appendChild(content);

            return section;
        }

        // Toggle day content
        function toggleDayContent(day) {
            const content = document.getElementById(`day-${day}-content`);
            content.classList.toggle('active');
        }

        // Update progress
        function updateProgress() {
            let totalCheckboxes = 0;
            let checkedCheckboxes = 0;
            let totalStartScore = 0;
            let totalEndScore = 0;
            let daysWithScores = 0;

            DAYS_DATA.forEach(dayData => {
                // Count checkboxes
                dayData.checklist.forEach(item => {
                    totalCheckboxes++;
                    const checkbox = document.getElementById(item.id);
                    if (checkbox && checkbox.checked) {
                        checkedCheckboxes++;
                    }
                });

                // Calculate metrics
                const startInput = document.getElementById(`day${dayData.day}_start`);
                const endInput = document.getElementById(`day${dayData.day}_end`);
                const progressDiv = document.getElementById(`day${dayData.day}_progress`);

                if (startInput && endInput) {
                    const start = parseInt(startInput.value) || 0;
                    const end = parseInt(endInput.value) || 0;
                    const progress = end - start;

                    // Update progress display
                    progressDiv.textContent = progress >= 0 ? `+${progress}` : `${progress}`;
                    progressDiv.className = 'metric-progress';
                    if (progress > 0) {
                        progressDiv.classList.add('positive');
                    } else if (progress < 0) {
                        progressDiv.classList.add('negative');
                    } else {
                        progressDiv.classList.add('zero');
                    }

                    totalStartScore += start;
                    totalEndScore += end;
                    daysWithScores++;
                }

                // Update day completion
                updateDayCompletion(dayData.day);
            });

            // Update overall progress
            const progressPercent = totalCheckboxes > 0 ? Math.round((checkedCheckboxes / totalCheckboxes) * 100) : 0;
            const progressFill = document.getElementById('progressFill');
            progressFill.style.width = progressPercent + '%';
            progressFill.textContent = progressPercent + '%';

            document.getElementById('completedCount').textContent = `${checkedCheckboxes}/${totalCheckboxes}`;

            // Update average scores
            const avgStart = daysWithScores > 0 ? (totalStartScore / daysWithScores).toFixed(1) : '-';
            const avgEnd = daysWithScores > 0 ? (totalEndScore / daysWithScores).toFixed(1) : '-';

            document.getElementById('avgStart').textContent = avgStart;
            document.getElementById('avgEnd').textContent = avgEnd;

            // Check if all completed
            if (progressPercent === 100) {
                document.getElementById('completionMessage').classList.add('show');
            } else {
                document.getElementById('completionMessage').classList.remove('show');
            }
        }

        // Update day completion status
        function updateDayCompletion(day) {
            const daySection = document.getElementById(`day-${day}`);
            const dayData = DAYS_DATA[day - 1];
            
            let allChecked = true;
            dayData.checklist.forEach(item => {
                const checkbox = document.getElementById(item.id);
                if (!checkbox || !checkbox.checked) {
                    allChecked = false;
                }
            });

            if (allChecked) {
                daySection.classList.add('completed');
            } else {
                daySection.classList.remove('completed');
            }
        }

        // Copy to clipboard
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('コピーしました！SNSにペーストしてシェアしてください。');
            });
        }

        // Save data to localStorage
        function saveData() {
            const data = {};

            DAYS_DATA.forEach(dayData => {
                dayData.checklist.forEach(item => {
                    const checkbox = document.getElementById(item.id);
                    if (checkbox) {
                        data[item.id] = checkbox.checked;
                    }
                });

                const startInput = document.getElementById(`day${dayData.day}_start`);
                const endInput = document.getElementById(`day${dayData.day}_end`);

                if (startInput) {
                    data[`day${dayData.day}_start`] = startInput.value;
                }
                if (endInput) {
                    data[`day${dayData.day}_end`] = endInput.value;
                }
            });

            localStorage.setItem('chakraResetData', JSON.stringify(data));
        }

        // Load data from localStorage
        function loadData() {
            const data = localStorage.getItem('chakraResetData');
            if (!data) return;

            const parsedData = JSON.parse(data);

            Object.keys(parsedData).forEach(key => {
                const element = document.getElementById(key);
                if (element) {
                    if (element.type === 'checkbox') {
                        element.checked = parsedData[key];
                    } else {
                        element.value = parsedData[key];
                    }
                }
            });

            updateProgress();
        }

        // Reset all data
        function resetAllData() {
            if (confirm('すべてのデータを削除してもよろしいですか？この操作は取り消せません。')) {
                localStorage.removeItem('chakraResetData');
                location.reload();
            }
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            init();
            loadData();
        });
    </script>
</body>
</html>
