<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luminous Path — ルミナス・パス</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --midnight: #06080f;
    --deep-navy: #0b1025;
    --navy: #101835;
    --sacral: #ff7a3c;
    --sacral-glow: rgba(255,122,60,0.35);
    --crystal-blue: #6ecfff;
    --crystal-violet: #b07fff;
    --crystal-rose: #ff6eb0;
    --crystal-gold: #ffd97a;
    --crystal-teal: #5af0d0;
    --text-main: #e8e4f0;
    --text-muted: rgba(232,228,240,0.55);
    --glass: rgba(255,255,255,0.045);
    --glass-border: rgba(255,255,255,0.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:'Zen Kaku Gothic New',sans-serif;
    background:var(--midnight);
    color:var(--text-main);
    display:flex;flex-direction:column;
  }

  /* ── STARFIELD ── */
  #stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .star{position:absolute;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite alternate;}
  @keyframes twinkle{from{opacity:.15;transform:scale(1);}to{opacity:.8;transform:scale(1.4);}}

  /* ── HEADER ── */
  header{
    position:relative;z-index:10;
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 28px 14px;
    border-bottom:1px solid var(--glass-border);
    background:linear-gradient(180deg,rgba(6,8,15,.95) 0%,transparent 100%);
    flex-shrink:0;
  }
  .logo{
    font-family:'Cormorant Garamond',serif;
    font-size:1.45rem;font-weight:300;letter-spacing:.12em;
    background:linear-gradient(135deg,var(--crystal-gold),var(--sacral),var(--crystal-violet));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .logo span{font-style:italic;}
  .phase-tag{
    font-size:.65rem;letter-spacing:.2em;color:var(--text-muted);
    border:1px solid var(--glass-border);padding:4px 10px;border-radius:20px;
  }

  /* ── MAIN LAYOUT ── */
  .app{
    position:relative;z-index:5;
    flex:1;display:grid;
    grid-template-columns:1fr 360px;
    grid-template-rows:1fr auto;
    gap:0;overflow:hidden;
    min-height:0;
  }

  /* ── LEFT: CHAT ── */
  .chat-panel{
    display:flex;flex-direction:column;
    border-right:1px solid var(--glass-border);
    overflow:hidden;min-height:0;
  }
  .chat-header{
    padding:16px 24px 12px;
    border-bottom:1px solid var(--glass-border);
    flex-shrink:0;
  }
  .healer-avatar{
    display:flex;align-items:center;gap:12px;
  }
  .avatar-orb{
    width:40px;height:40px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,var(--crystal-violet),var(--sacral));
    box-shadow:0 0 18px var(--sacral-glow);
    display:flex;align-items:center;justify-content:center;
    font-size:1.1rem;
    animation:pulse-orb 3s ease-in-out infinite;
    flex-shrink:0;
  }
  @keyframes pulse-orb{0%,100%{box-shadow:0 0 18px var(--sacral-glow);}50%{box-shadow:0 0 35px rgba(176,127,255,.5),0 0 60px var(--sacral-glow);}}
  .healer-name{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:300;letter-spacing:.06em;}
  .healer-sub{font-size:.68rem;color:var(--text-muted);letter-spacing:.08em;margin-top:1px;}
  .online-dot{width:7px;height:7px;background:#5af0d0;border-radius:50%;box-shadow:0 0 8px #5af0d0;margin-left:auto;flex-shrink:0;}

  .chat-messages{
    flex:1;overflow-y:auto;padding:20px 24px;
    display:flex;flex-direction:column;gap:16px;
    min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;
  }
  .chat-messages::-webkit-scrollbar{width:4px;}
  .chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px;}

  .msg{display:flex;gap:10px;animation:fadeUp .4s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .msg.user{flex-direction:row-reverse;}
  .msg-avatar{
    width:30px;height:30px;border-radius:50%;flex-shrink:0;
    background:radial-gradient(circle at 35% 35%,var(--crystal-violet),var(--sacral));
    display:flex;align-items:center;justify-content:center;font-size:.8rem;
    box-shadow:0 0 12px var(--sacral-glow);
  }
  .msg.user .msg-avatar{background:linear-gradient(135deg,var(--crystal-teal),var(--crystal-blue));}
  .msg-bubble{
    max-width:82%;padding:11px 15px;border-radius:16px;
    font-size:.82rem;line-height:1.7;
    background:var(--glass);border:1px solid var(--glass-border);
    backdrop-filter:blur(12px);
  }
  .msg.user .msg-bubble{
    background:rgba(110,207,255,.07);border-color:rgba(110,207,255,.15);
  }
  .msg-bubble .gem{
    display:inline-block;width:8px;height:8px;border-radius:50%;
    margin-right:5px;vertical-align:middle;
  }

  .typing-indicator{display:flex;gap:5px;align-items:center;padding:4px 0;}
  .typing-indicator span{
    width:6px;height:6px;border-radius:50%;
    background:var(--crystal-violet);
    animation:bounce .9s ease-in-out infinite;
  }
  .typing-indicator span:nth-child(2){animation-delay:.15s;}
  .typing-indicator span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

  .chat-input-area{
    padding:14px 20px 16px;
    border-top:1px solid var(--glass-border);
    display:flex;gap:10px;align-items:flex-end;
    flex-shrink:0;
  }
  .chat-input{
    flex:1;background:var(--glass);border:1px solid var(--glass-border);
    border-radius:22px;padding:10px 16px;
    color:var(--text-main);font-family:'Zen Kaku Gothic New',sans-serif;
    font-size:.82rem;resize:none;outline:none;
    max-height:90px;min-height:40px;
    transition:border-color .2s;
    scrollbar-width:none;
  }
  .chat-input::placeholder{color:var(--text-muted);}
  .chat-input:focus{border-color:rgba(176,127,255,.4);}
  .send-btn{
    width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
    background:radial-gradient(circle at 35% 35%,var(--crystal-violet),#6a3fff);
    box-shadow:0 0 15px rgba(176,127,255,.4);
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s,box-shadow .15s;
    flex-shrink:0;
  }
  .send-btn:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(176,127,255,.6);}
  .send-btn svg{width:16px;height:16px;fill:white;}

  /* ── QUICK PROMPTS ── */
  .quick-prompts{
    padding:0 20px 10px;
    display:flex;gap:7px;flex-wrap:wrap;
    flex-shrink:0;
  }
  .qp{
    font-size:.67rem;padding:5px 10px;border-radius:14px;
    border:1px solid var(--glass-border);background:var(--glass);
    cursor:pointer;color:var(--text-muted);transition:.2s;white-space:nowrap;
    letter-spacing:.03em;
  }
  .qp:hover{border-color:var(--sacral);color:var(--sacral);}

  /* ── RIGHT: CALENDAR ── */
  .calendar-panel{
    display:flex;flex-direction:column;overflow:hidden;min-height:0;
  }
  .cal-header{
    padding:16px 20px 12px;
    border-bottom:1px solid var(--glass-border);
    flex-shrink:0;
  }
  .cal-title{
    font-family:'Cormorant Garamond',serif;font-size:1.1rem;
    font-weight:300;letter-spacing:.06em;
    display:flex;align-items:center;gap:8px;
  }
  .cal-subtitle{font-size:.67rem;color:var(--text-muted);letter-spacing:.1em;margin-top:3px;}
  .month-nav{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:10px;
  }
  .month-label{font-size:.8rem;letter-spacing:.08em;color:var(--text-muted);}
  .nav-btn{
    background:none;border:none;cursor:pointer;
    color:var(--text-muted);font-size:.9rem;padding:3px 8px;
    transition:color .2s;
  }
  .nav-btn:hover{color:var(--crystal-violet);}

  .cal-grid-wrapper{flex:1;overflow-y:auto;padding:16px 20px 20px;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;}
  .cal-weekdays{
    display:grid;grid-template-columns:repeat(7,1fr);
    gap:3px;margin-bottom:6px;
  }
  .cal-weekday{text-align:center;font-size:.6rem;color:var(--text-muted);letter-spacing:.08em;padding:2px 0;}
  .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-day{
    aspect-ratio:1;border-radius:10px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;position:relative;
    background:var(--glass);border:1px solid transparent;
    transition:all .2s;font-size:.72rem;color:var(--text-muted);
    overflow:hidden;
  }
  .cal-day:hover{border-color:var(--glass-border);color:var(--text-main);}
  .cal-day.empty{background:none;cursor:default;border-color:transparent;}
  .cal-day.today{border-color:rgba(176,127,255,.4);color:var(--text-main);}
  .cal-day.today::after{
    content:'';position:absolute;inset:0;
    background:radial-gradient(circle,rgba(176,127,255,.12) 0%,transparent 70%);
  }
  .cal-day.done{
    background:none;border-color:transparent;
  }
  .crystal{
    font-size:1.3rem;line-height:1;margin-bottom:1px;
    animation:gem-glow 2s ease-in-out infinite alternate;
    filter:drop-shadow(0 0 5px var(--crystal-violet));
  }
  @keyframes gem-glow{from{filter:drop-shadow(0 0 4px rgba(176,127,255,.6));}to{filter:drop-shadow(0 0 10px rgba(176,127,255,.9)) drop-shadow(0 0 18px rgba(255,122,60,.4));}}
  .day-num{font-size:.6rem;color:var(--text-muted);}
  .cal-day.done .day-num{color:rgba(176,127,255,.8);}

  /* ── STATS STRIP ── */
  .stats-strip{
    padding:12px 20px;border-top:1px solid var(--glass-border);
    display:flex;gap:0;flex-shrink:0;
  }
  .stat{flex:1;text-align:center;padding:4px 0;}
  .stat + .stat{border-left:1px solid var(--glass-border);}
  .stat-num{
    font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;
    background:linear-gradient(135deg,var(--crystal-gold),var(--sacral));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    line-height:1;
  }
  .stat-label{font-size:.6rem;color:var(--text-muted);letter-spacing:.08em;margin-top:2px;}

  /* ── MELT-LIGHT VISUALIZER ── */
  .melt-panel{
    grid-column:1/-1;
    border-top:1px solid var(--glass-border);
    padding:14px 24px;
    display:flex;align-items:center;gap:24px;
    flex-shrink:0;
    background:rgba(6,8,15,.6);
    backdrop-filter:blur(10px);
  }
  .melt-label{
    font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:300;
    letter-spacing:.06em;color:var(--text-muted);white-space:nowrap;
  }
  .melt-track{
    flex:1;height:10px;border-radius:5px;
    background:rgba(255,255,255,.06);border:1px solid var(--glass-border);
    overflow:hidden;position:relative;
  }
  .melt-fill{
    height:100%;border-radius:5px;
    background:linear-gradient(90deg,var(--crystal-teal),var(--crystal-violet),var(--sacral));
    transition:width 1.2s cubic-bezier(.4,0,.2,1);
    box-shadow:0 0 12px rgba(176,127,255,.5);
    position:relative;overflow:hidden;
  }
  .melt-fill::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
    animation:shimmer 2s linear infinite;
  }
  @keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}
  .melt-particles{position:absolute;right:-2px;top:50%;transform:translateY(-50%);font-size:.8rem;animation:float-particle 2s ease-in-out infinite alternate;}
  @keyframes float-particle{from{transform:translateY(-50%) scale(1);}to{transform:translateY(-60%) scale(1.2);}}
  .melt-pct{
    font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:300;
    background:linear-gradient(135deg,var(--crystal-teal),var(--crystal-violet));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    white-space:nowrap;
  }

  /* ── MODAL OVERLAY (day detail) ── */
  .modal-overlay{
    display:none;position:fixed;inset:0;z-index:100;
    background:rgba(6,8,15,.75);backdrop-filter:blur(10px);
    align-items:center;justify-content:center;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--deep-navy);border:1px solid var(--glass-border);
    border-radius:20px;padding:28px;width:320px;
    animation:modalIn .25s ease;
    box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 40px rgba(176,127,255,.08);
  }
  @keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
  .modal-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;margin-bottom:4px;}
  .modal-date{font-size:.67rem;color:var(--text-muted);letter-spacing:.1em;margin-bottom:16px;}
  .modal-section{margin-bottom:14px;}
  .modal-section-label{font-size:.65rem;letter-spacing:.14em;color:var(--crystal-teal);margin-bottom:8px;}
  .food-tags{display:flex;flex-wrap:wrap;gap:6px;}
  .food-tag{
    font-size:.7rem;padding:4px 10px;border-radius:12px;
    border:1px solid;
  }
  .food-tag.orange{border-color:var(--sacral);color:var(--sacral);background:rgba(255,122,60,.06);}
  .food-tag.teal{border-color:var(--crystal-teal);color:var(--crystal-teal);background:rgba(90,240,208,.06);}
  .food-tag.violet{border-color:var(--crystal-violet);color:var(--crystal-violet);background:rgba(176,127,255,.06);}
  .fast-bar{
    display:flex;align-items:center;gap:8px;margin-top:8px;
  }
  .fast-icon{font-size:1rem;}
  .fast-desc{font-size:.75rem;color:var(--text-main);}
  .fast-time{
    margin-left:auto;font-size:.7rem;
    padding:3px 8px;border-radius:10px;
    background:rgba(110,207,255,.08);border:1px solid rgba(110,207,255,.2);
    color:var(--crystal-blue);
  }
  .modal-actions{display:flex;gap:8px;margin-top:18px;}
  .modal-btn{
    flex:1;padding:9px;border-radius:12px;border:none;cursor:pointer;
    font-family:'Zen Kaku Gothic New',sans-serif;font-size:.75rem;
    transition:all .2s;
  }
  .modal-btn.primary{
    background:linear-gradient(135deg,var(--crystal-violet),#5a2fff);
    color:white;box-shadow:0 4px 15px rgba(176,127,255,.25);
  }
  .modal-btn.primary:hover{box-shadow:0 4px 25px rgba(176,127,255,.45);}
  .modal-btn.secondary{
    background:var(--glass);border:1px solid var(--glass-border);color:var(--text-muted);
  }

  /* loading dots */
  .loading-msg{opacity:.6;font-style:italic;}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<header>
  <div class="logo">Luminous <span>Path</span></div>
  <div class="phase-tag">PHASE 3 PROTOTYPE</div>
</header>

<div class="app">
  <!-- CHAT -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="healer-avatar">
        <div class="avatar-orb">✦</div>
        <div>
          <div class="healer-name">Luna — ウェルネス・ヒーラー</div>
          <div class="healer-sub">あなたの内なる光を導く存在</div>
        </div>
        <div class="online-dot"></div>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="quick-prompts">
      <div class="qp" onclick="sendQuick('今日の食事プランを教えて')">🍊 今日の食事</div>
      <div class="qp" onclick="sendQuick('断食のタイミングは？')">⏳ 断食ガイド</div>
      <div class="qp" onclick="sendQuick('第2チャクラを癒す食材は？')">💎 チャクラフード</div>
      <div class="qp" onclick="sendQuick('今の体の浄化はどのくらい進んでる？')">✨ 浄化の進捗</div>
    </div>

    <div class="chat-input-area">
      <textarea class="chat-input" id="chatInput" placeholder="Lunaに話しかける…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="calendar-panel">
    <div class="cal-header">
      <div class="cal-title">💎 チャクラ・カレンダー</div>
      <div class="cal-subtitle">CRYSTAL HEALING TRACKER</div>
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
        <div class="month-label" id="monthLabel"></div>
        <button class="nav-btn" onclick="changeMonth(1)">▶</button>
      </div>
    </div>
    <div class="cal-grid-wrapper">
      <div class="cal-weekdays">
        <div class="cal-weekday">日</div><div class="cal-weekday">月</div>
        <div class="cal-weekday">火</div><div class="cal-weekday">水</div>
        <div class="cal-weekday">木</div><div class="cal-weekday">金</div>
        <div class="cal-weekday">土</div>
      </div>
      <div class="cal-days" id="calDays"></div>
    </div>
    <div class="stats-strip">
      <div class="stat"><div class="stat-num" id="streakNum">0</div><div class="stat-label">連続ケア</div></div>
      <div class="stat"><div class="stat-num" id="doneNum">0</div><div class="stat-label">達成日</div></div>
      <div class="stat"><div class="stat-num" id="crystalNum">0</div><div class="stat-label">クリスタル</div></div>
    </div>
  </div>

  <!-- MELT-LIGHT BAR -->
  <div class="melt-panel">
    <div class="melt-label">光の溶融 — 浄化の道</div>
    <div class="melt-track">
      <div class="melt-fill" id="meltFill" style="width:0%">
        <div class="melt-particles">✦</div>
      </div>
    </div>
    <div class="melt-pct" id="meltPct">0%</div>
  </div>
</div>

<!-- DAY MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="dayModal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-section">
      <div class="modal-section-label">🍊 第2チャクラ・フード</div>
      <div class="food-tags" id="modalFoods"></div>
    </div>
    <div class="modal-section">
      <div class="modal-section-label">⏳ 断食プロトコル</div>
      <div class="fast-bar">
        <span class="fast-icon">🌙</span>
        <span class="fast-desc">オートファジー断食</span>
        <span class="fast-time" id="modalFast"></span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal()">閉じる</button>
      <button class="modal-btn primary" onclick="markDone()">✦ 達成する</button>
    </div>
  </div>
</div>

<script>
// ── Stars ──
(function(){
  const c=document.getElementById('stars'),ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  const stars=[];
  for(let i=0;i<180;i++){
    stars.push({x:Math.random()*c.width,y:Math.random()*c.height,
      r:Math.random()*.9+.2,a:Math.random(),da:(Math.random()*.008+.002)*(Math.random()<.5?1:-1),
      hue:Math.random()<.3?260:Math.random()<.5?200:30});
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a=Math.max(.05,Math.min(1,s.a+s.da));
      if(s.a<=.05||s.a>=1)s.da*=-1;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${s.hue},80%,85%,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Calendar state ──
const today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();
let doneDays = new Set();
let selectedDay = null;

const crystals = ['💎','🔮','✨','💜','🌟','🧿','🪩'];
const fastOptions = ['16:8','18:6','14:10','16:8','18:6'];
const foodSets = [
  [{t:'orange',n:'にんじん'},{t:'orange',n:'かぼちゃ'},{t:'teal',n:'アボカド'},{t:'violet',n:'ブルーベリー'}],
  [{t:'orange',n:'さつまいも'},{t:'teal',n:'ほうれん草'},{t:'orange',n:'マンゴー'},{t:'violet',n:'紫キャベツ'}],
  [{t:'teal',n:'ブロッコリー'},{t:'orange',n:'みかん'},{t:'violet',n:'赤ビーツ'},{t:'teal',n:'アスパラ'}],
  [{t:'orange',n:'パパイヤ'},{t:'teal',n:'ケール'},{t:'violet',n:'なす'},{t:'orange',n:'オレンジ'}],
  [{t:'violet',n:'いちご'},{t:'teal',n:'きゅうり'},{t:'orange',n:'くるみ'},{t:'teal',n:'ズッキーニ'}],
];

function buildCalendar(){
  const ml=document.getElementById('monthLabel');
  const cd=document.getElementById('calDays');
  ml.textContent=`${currentYear}年 ${currentMonth+1}月`;
  cd.innerHTML='';
  const first=new Date(currentYear,currentMonth,1).getDay();
  const days=new Date(currentYear,currentMonth+1,0).getDate();
  for(let i=0;i<first;i++){
    const d=document.createElement('div');d.className='cal-day empty';cd.appendChild(d);
  }
  for(let d=1;d<=days;d++){
    const el=document.createElement('div');
    el.className='cal-day';
    const key=`${currentYear}-${currentMonth}-${d}`;
    const isToday=d===today.getDate()&&currentMonth===today.getMonth()&&currentYear===today.getFullYear();
    if(isToday)el.classList.add('today');
    if(doneDays.has(key)){
      el.classList.add('done');
      const ci=((currentMonth+d)%crystals.length);
      el.innerHTML=`<div class="crystal">${crystals[ci]}</div><div class="day-num">${d}</div>`;
    } else {
      el.innerHTML=`<div class="day-num">${d}</div>`;
    }
    el.onclick=()=>openModal(d);
    cd.appendChild(el);
  }
  updateStats();
  updateMelt();
}

function updateStats(){
  // streak
  let streak=0;
  for(let i=today.getDate();i>=1;i--){
    const k=`${today.getFullYear()}-${today.getMonth()}-${i}`;
    if(doneDays.has(k))streak++;else break;
  }
  document.getElementById('streakNum').textContent=streak+'日';
  document.getElementById('doneNum').textContent=doneDays.size;
  document.getElementById('crystalNum').textContent=doneDays.size;
}

function updateMelt(){
  const pct=Math.min(100,Math.round((doneDays.size/30)*100));
  document.getElementById('meltFill').style.width=pct+'%';
  document.getElementById('meltPct').textContent=pct+'%';
}

function openModal(d){
  selectedDay=d;
  const key=`${currentYear}-${currentMonth}-${d}`;
  const isDone=doneDays.has(key);
  document.getElementById('modalTitle').textContent=isDone?`${d}日 ✦ 達成済み`:`${d}日 のケアプラン`;
  const wdays=['日','月','火','水','木','金','土'];
  const w=new Date(currentYear,currentMonth,d).getDay();
  document.getElementById('modalDate').textContent=`${currentYear}年${currentMonth+1}月${d}日（${wdays[w]}） • 第2チャクラケア`;
  const fi=((currentMonth+d)%foodSets.length);
  const mf=document.getElementById('modalFoods');
  mf.innerHTML='';
  foodSets[fi].forEach(f=>{
    const t=document.createElement('div');
    t.className=`food-tag ${f.t}`;t.textContent=f.n;mf.appendChild(t);
  });
  document.getElementById('modalFast').textContent=fastOptions[d%fastOptions.length];
  const btn=document.querySelector('.modal-btn.primary');
  if(isDone){btn.textContent='✦ 達成済み';btn.style.opacity='.5';btn.style.pointerEvents='none';}
  else{btn.textContent='✦ 達成する';btn.style.opacity='1';btn.style.pointerEvents='auto';}
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

function markDone(){
  if(!selectedDay)return;
  const key=`${currentYear}-${currentMonth}-${selectedDay}`;
  doneDays.add(key);
  closeModal();
  buildCalendar();
  // Trigger Luna reaction
  addMessage('luna',`✦ 素晴らしい！${selectedDay}日のケアを光のクリスタルに刻みました。あなたの細胞がそっと微笑んでいます。浄化の道は${Math.min(100,Math.round((doneDays.size/30)*100))}%まで輝きを増しました 💎`);
}

function changeMonth(dir){
  currentMonth+=dir;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  buildCalendar();
}

// ── Chat ──
const initialMessages=[
  {role:'luna',text:'✦ ようこそ、Luminous Path へ。\n\nわたしは Luna —— あなたの内なる光を静かに見守るウェルネス・ヒーラーです。\n\nあなたの身体は、今もかつてと変わらず自己修復の力を宿しています。食事と断食、そしてチャクラのエネルギーを整えることで、その力を丁寧に呼び起こしていきましょう。\n\n今日、どんなことを感じていますか？'},
];

function addMessage(role,text){
  const box=document.getElementById('chatMessages');
  const div=document.createElement('div');
  div.className=`msg ${role==='user'?'user':''}`;
  const av=document.createElement('div');av.className='msg-avatar';
  av.textContent=role==='user'?'🌸':'✦';
  const bub=document.createElement('div');bub.className='msg-bubble';
  bub.style.whiteSpace='pre-wrap';
  bub.textContent=text;
  div.appendChild(av);div.appendChild(bub);
  box.appendChild(div);
  box.scrollTop=box.scrollHeight;
}

function addTyping(){
  const box=document.getElementById('chatMessages');
  const div=document.createElement('div');div.className='msg';div.id='typing';
  const av=document.createElement('div');av.className='msg-avatar';av.textContent='✦';
  const bub=document.createElement('div');bub.className='msg-bubble';
  bub.innerHTML='<div class="typing-indicator"><span></span><span></span><span></span></div>';
  div.appendChild(av);div.appendChild(bub);
  box.appendChild(div);box.scrollTop=box.scrollHeight;
  return div;
}

async function callClaude(userMsg){
  const t=addTyping();
  const conversationHistory = [];
  document.querySelectorAll('#chatMessages .msg').forEach(el=>{
    if(el.id==='typing')return;
    const isUser=el.classList.contains('user');
    const text=el.querySelector('.msg-bubble')?.textContent||'';
    conversationHistory.push({role:isUser?'user':'assistant',content:text});
  });
  conversationHistory.push({role:'user',content:userMsg});

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:`あなたは「Luminous Path」というウェルネスアプリのAIヒーラー「Luna」です。
ユーザーは卵巣嚢腫などの健康課題を自然療法で改善したいと考えています。

以下のルールに従って応答してください：
- 温かく慈愛に満ちた言葉で、ユーザーを全肯定する
- 専門用語は宝石・自然・光のメタファーに置き換える（例：「炎症」→「身体の熱い滞り」）
- 抗炎症食、オートファジー断食（16:8、18:6等）、第2チャクラ（仙骨チャクラ）ケアを統合したアドバイスを行う
- 第2チャクラに対応するオレンジ色の食材（にんじん、かぼちゃ、さつまいも、マンゴー等）を推薦する
- 回答は150〜250文字程度の簡潔な日本語で
- 必ず1〜2個の絵文字を使用（💎✨🌸🔮🌙🍊など）
- 医療的な断言は避け「サポートします」「寄り添います」などの言葉を使う
- 「管理」「治療」ではなく「慈しみ」「浄化」「調律」の言葉を使う`,
        messages:conversationHistory,
      })
    });
    const data=await res.json();
    t.remove();
    const reply=data.content?.[0]?.text||'✦ ちょっと待ってね…';
    addMessage('luna',reply);
  }catch(e){
    t.remove();
    addMessage('luna','✦ 少し光の通り道が混んでいるようです。もう一度話しかけてみてください 🌙');
  }
}

async function sendMessage(){
  const inp=document.getElementById('chatInput');
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  addMessage('user',txt);
  await callClaude(txt);
}

function sendQuick(txt){
  document.getElementById('chatInput').value=txt;
  sendMessage();
}

initialMessages.forEach(m=>addMessage(m.role,m.text));

[1,3,5,7,8,10,12,14].forEach(d=>{
  if(d<today.getDate())doneDays.add(`${demoYear}-${demoBase}-${d}`);
});

buildCalendar();
